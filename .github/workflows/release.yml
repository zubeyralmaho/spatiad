name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-rust-binaries:
    name: Build Rust Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p spatiad-bin

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p ../release-artifacts
          cp target/release/spatiad-bin ../release-artifacts/spatiad-bin-${{ runner.os }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spatiad-bin-${{ runner.os }}
          path: release-artifacts/spatiad-bin-${{ runner.os }}

  create-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-rust-binaries]
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release with binaries
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/spatiad-bin-Linux/spatiad-bin-Linux
            dist/spatiad-bin-macOS/spatiad-bin-macOS
