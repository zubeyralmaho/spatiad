apiVersion: v1
kind: Namespace
metadata:
  name: spatiad
  labels:
    name: spatiad

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spatiad-config
  namespace: spatiad
  labels:
    app: spatiad
data:
  SPATIAD_LOG_LEVEL: "info"
  SPATIAD_H3_RESOLUTION: "8"
  SPATIAD_BIND_ADDR: "0.0.0.0:3000"
  SPATIAD_DISPATCH_RATE_LIMIT_PER_MIN: "240"
  SPATIAD_WS_RECONNECT_MAX_PER_MIN: "30"

---
apiVersion: v1
kind: Secret
metadata:
  name: spatiad-secrets
  namespace: spatiad
  labels:
    app: spatiad
type: Opaque
stringData:
  # Configure these in production
  SPATIAD_WEBHOOK_SECRET: dev-secret
  SPATIAD_DISPATCHER_TOKEN: dispatcher-token
  SPATIAD_DRIVER_TOKEN: driver-token

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spatiad
  namespace: spatiad
  labels:
    app: spatiad
    version: v0.1.0
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: spatiad
  template:
    metadata:
      labels:
        app: spatiad
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: default
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      
      containers:
      - name: spatiad
        image: spatiad:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        
        envFrom:
        - configMapRef:
            name: spatiad-config
        - secretRef:
            name: spatiad-secrets
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000

---
apiVersion: v1
kind: Service
metadata:
  name: spatiad
  namespace: spatiad
  labels:
    app: spatiad
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: spatiad
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: spatiad-nodeport
  namespace: spatiad
  labels:
    app: spatiad
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: http
    protocol: TCP
    nodePort: 30000
    name: http
  selector:
    app: spatiad
